name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk-headless build-essential libffi-dev libssl-dev pkg-config automake m4 libltdl-dev gettext libtool
    - name: Install buildozer
      run: pip install buildozer cython
    - name: Build APK
      run: |
        export PATH=$PATH:$HOME/.local/bin
        yes | buildozer -v android debug
    - uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
