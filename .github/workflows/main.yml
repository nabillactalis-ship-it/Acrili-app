name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install buildozer
      run: pip install buildozer cython
    - name: Build APK
      run: buildozer -v android debug
    - uses: actions/upload-artifact@v3
      with:
        name: package
        path: bin/*.apk
